name: Publish to PyPI

# One-time setup (required before first successful upload):
#   https://pypi.org/manage/account/publishing/
#   PyPI project name:  cursor-proxmox-mcp
#   Owner:              hackmods
#   Repository:         cursor-proxmox-mcp
#   Workflow:           publish.yml
#   Environment name:   pypi
#
# After Trusted Publishing is configured, publishing a GitHub Release (or
# re-running this workflow) uploads the package. Then:
#   uvx cursor-proxmox-mcp

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

name: Publish to PyPI

# One-time setup (required before first successful upload):
#   https://pypi.org/manage/account/publishing/
#   PyPI project name:  cursor-proxmox-mcp
#   Owner:              hackmods
#   Repository:         cursor-proxmox-mcp
#   Workflow name:      release.yml   (primary; tag push)
#   Also register:      publish.yml   (manual retry / release-created-via-gh)
#   Environment name:   pypi
#
# Tag pushes run release.yml (PyPI + GHCR + GitHub Release).
# workflow_dispatch here is for re-upload without retagging.
# `release: published` only fires when the Release is created outside
# Actions (e.g. `gh release create`), not by softprops + GITHUB_TOKEN.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

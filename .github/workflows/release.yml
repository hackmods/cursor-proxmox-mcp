name: Release

# On tag v*: build artifacts, publish to PyPI (OIDC + environment pypi),
# push GHCR image, create/update GitHub Release.
# Note: Releases created with GITHUB_TOKEN do not trigger publish.yml's
# `release: published` event — PyPI upload lives here instead.
# Manual PyPI retry: Actions → Publish to PyPI → Run workflow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build/push (e.g. v1.1.0). Leave empty to use the triggering tag."
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      # Primary PyPI path is also publish.yml (Trusted Publisher). Keep this step
      # non-blocking so GHCR + Release assets still ship if release.yml claims drift.
      - name: Publish to PyPI
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: meta
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          TAG="${REF##*/}"
          TAG="${TAG#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:v${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.title=cursor-proxmox-mcp
            org.opencontainers.image.description=Formal Cursor MCP server for Proxmox VE
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            io.modelcontextprotocol.server.name=io.github.hackmods/cursor-proxmox-mcp

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*

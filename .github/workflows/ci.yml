name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Entrypoint smoke
        env:
          PYTHONPATH: src
        run: python -c "from proxmox_mcp.server import main; print('entrypoint ok')"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        env:
          PYTHONPATH: src
        run: pytest tests/ -q --tb=short

      - name: Inventory floor
        env:
          PYTHONPATH: src
        run: python -c "from tests.expected_tools import EXPECTED_TOOLS; assert len(EXPECTED_TOOLS) >= 100"

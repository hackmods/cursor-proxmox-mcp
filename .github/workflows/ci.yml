name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Entrypoint smoke
        env:
          PYTHONPATH: src
        run: python -c "from proxmox_mcp.server import main; print('entrypoint ok')"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy (strict subset)
        run: mypy src/proxmox_mcp/errors.py src/proxmox_mcp/tools/base.py src/proxmox_mcp/core --ignore-missing-imports || true

      - name: Pytest + coverage
        env:
          PYTHONPATH: src
        run: pytest tests/ -q --tb=short

      - name: Inventory floor
        env:
          PYTHONPATH: src
        run: python -c "from proxmox_mcp.tools.inventory import ALL_TOOL_NAMES; assert len(ALL_TOOL_NAMES) >= 100"

      - name: pip-audit
        run: pip-audit || true

      - name: Bandit
        run: bandit -r src/proxmox_mcp -ll || true

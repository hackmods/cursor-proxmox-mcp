name: Publish to MCP Registry

# Publishes server.json to https://registry.modelcontextprotocol.io
# after a version tag is pushed. Requires the PyPI/GHCR artifacts for
# that version to already exist (release.yml runs on the same tag).
#
# Auth: GitHub OIDC — no secrets needed. Namespace must be
# io.github.hackmods/... (matches repository owner).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
